<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learning Progress | EduTrack</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="../css/student.css">
</head>

<body>

    <!-- Navbar -->

    <nav class="navbar navbar-expand-lg shadow-sm">

        <div class="container">

            <a class="navbar-brand fw-bold" href="student-dashboard.html">
                <i class="bi bi-mortarboard-fill"></i>EduTrack
            </a>

            <div class="ms-auto">

                <a href="dashboard.html" class="btn btn-outline-primary">
                    Dashboard
                </a>

            </div>

        </div>

    </nav>

    <div class="container py-5">

        <h2 class="mb-4">
            Learning Progress
        </h2>

        <!-- Statistics -->

        <div class="row g-4 mb-5">

            <div class="col-md-3">

                <div class="card text-center p-4">

                    <i class="bi bi-journal-bookmark-fill display-5 text-primary"></i>

                    <h3 class="mt-3">6</h3>

                    <p>Enrolled Courses</p>

                </div>

            </div>

            <div class="col-md-3">

                <div class="card text-center p-4">

                    <i class="bi bi-check-circle-fill display-5 text-success"></i>

                    <h3 class="mt-3">3</h3>

                    <p>Completed</p>

                </div>

            </div>

            <div class="col-md-3">

                <div class="card text-center p-4">

                    <i class="bi bi-clock-history display-5 text-warning"></i>

                    <h3 class="mt-3">48</h3>

                    <p>Learning Hours</p>

                </div>

            </div>

            <div class="col-md-3">

                <div class="card text-center p-4">

                    <i class="bi bi-award-fill display-5 text-danger"></i>

                    <h3 class="mt-3">2</h3>

                    <p>Certificates</p>

                </div>

            </div>

        </div>

        <!-- Course Progress -->

        <h3 class="mb-4">
            Course Progress
        </h3>

        <div class="card p-4 mb-4">

            <div class="d-flex justify-content-between">

                <strong>Full Stack Development</strong>

                <span>75%</span>

            </div>

            <div class="progress mt-2">

                <div class="progress-bar" style="width:75%">
                    75%
                </div>

            </div>

        </div>

        <div class="card p-4 mb-4">

            <div class="d-flex justify-content-between">

                <strong>Python Programming</strong>

                <span>60%</span>

            </div>

            <div class="progress mt-2">

                <div class="progress-bar" style="width:60%">
                    60%
                </div>

            </div>

        </div>

        <div class="card p-4 mb-4">

            <div class="d-flex justify-content-between">

                <strong>Artificial Intelligence</strong>

                <span>25%</span>

            </div>

            <div class="progress mt-2">

                <div class="progress-bar" style="width:25%">
                    25%
                </div>

            </div>

        </div>

        <!-- Achievement -->

        <h3 class="mt-5 mb-4">
            Achievements
        </h3>

        <div class="row g-4">

            <div class="col-md-4">

                <div class="card text-center p-4">

                    <i class="bi bi-award-fill display-3 text-warning"></i>

                    <h5 class="mt-3">
                        First Course Completed
                    </h5>

                </div>

            </div>

            <div class="col-md-4">

                <div class="card text-center p-4">

                    <i class="bi bi-star-fill display-3 text-warning"></i>

                    <h5 class="mt-3">
                        Top Learner
                    </h5>

                </div>

            </div>

            <div class="col-md-4">

                <div class="card text-center p-4">

                    <i class="bi bi-trophy-fill display-3 text-warning"></i>

                    <h5 class="mt-3">
                        50 Learning Hours
                    </h5>

                </div>

            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
