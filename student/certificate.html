<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certificate | StudySphere</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="../css/student.css">
</head>

<body>

    <!-- Navbar -->

    <nav class="navbar navbar-expand-lg shadow-sm">

        <div class="container">

            <a class="navbar-brand fw-bold" href="student-dashboard.html">
                StudySphere
            </a>

            <div class="ms-auto">

                <a href="progress.html" class="btn btn-outline-primary">
                    Back
                </a>

            </div>

        </div>

    </nav>

    <!-- Certificate -->

    <div class="container py-5">

        <div class="certificate-card text-center">

            <div class="mb-4">
                <i class="bi bi-award-fill display-1 text-warning"></i>
            </div>

            <h5 class="text-uppercase text-secondary">
                Certificate of Completion
            </h5>

            <h1 class="mt-3">
                EduTrack
            </h1>

            <p class="mt-4">
                This Certificate is Proudly Presented To
            </p>

            <h2 class="student-name">
                Datchayeni A.
            </h2>

            <p class="mt-4">
                For successfully completing the course
            </p>

            <h3 class="course-name">
                Full Stack Web Development
            </h3>

            <p class="mt-4">
                Completion Date
            </p>

            <h5>
                20 July 2026
            </h5>

            <div class="row mt-5">

                <div class="col-6">

                    <hr>

                    <h6>Instructor</h6>

                </div>

                <div class="col-6">

                    <hr>

                    <h6>Director</h6>

                </div>

            </div>

        </div>

        <!-- Buttons -->

        <div class="text-center mt-5">

            <button class="btn btn-primary me-3">
                <i class="bi bi-download"></i>
                Download Certificate
            </button>

            <button class="btn btn-outline-primary"
                onclick="window.print()">

                <i class="bi bi-printer"></i>
                Print

            </button>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
