<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Notifications | EduTrack</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="../css/admin.css">

</head>

<body>

<div class="container-fluid">

<div class="row">

    <!-- Sidebar -->

    <div class="col-lg-2 sidebar">

        <h3 class="text-center py-4"><i class="bi bi-mortarboard-fill"></i>EduTrack</h3>

        <a href="admin-dashboard.html">
            <i class="bi bi-speedometer2"></i>
            Dashboard
        </a>

        <a href="courses.html">
            <i class="bi bi-book"></i>
            Courses
        </a>

        <a href="students.html">
            <i class="bi bi-people"></i>
            Students
        </a>

        <a href="notifications.html" class="active">
            <i class="bi bi-bell"></i>
            Notifications
        </a>

        <a href="../Home page.html">
            <i class="bi bi-box-arrow-right"></i>
            Logout
        </a>

    </div>

    <!-- Main Content -->

    <div class="col-lg-10">

        <nav class="navbar bg-white shadow-sm px-4">

            <h4>Notifications</h4>

        </nav>

        <div class="container py-4">

            <!-- Send Notification -->

            <div class="card mb-4">

                <div class="card-header">

                    <h5>Send Notification</h5>

                </div>

                <div class="card-body">

                    <form>

                        <div class="mb-3">

                            <label class="form-label">
                                Notification Title
                            </label>

                            <input type="text"
                                class="form-control"
                                placeholder="Enter title">

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Message
                            </label>

                            <textarea class="form-control"
                                rows="5"
                                placeholder="Enter notification message"></textarea>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Send To
                            </label>

                            <select class="form-select">

                                <option>All Students</option>
                                <option>Computer Science</option>
                                <option>Information Technology</option>
                                <option>Artificial Intelligence</option>

                            </select>

                        </div>

                        <button class="btn btn-primary">

                            <i class="bi bi-send-fill"></i>

                            Send Notification

                        </button>

                    </form>

                </div>

            </div>

            <!-- Notification History -->

            <div class="card">

                <div class="card-header">

                    <h5>Notification History</h5>

                </div>

                <div class="card-body">

                    <table class="table table-hover">

                        <thead>

                            <tr>

                                <th>Title</th>
                                <th>Recipient</th>
                                <th>Date</th>
                                <th>Status</th>

                            </tr>

                        </thead>

                        <tbody>

                            <tr>

                                <td>React Workshop</td>

                                <td>All Students</td>

                                <td>10 July 2026</td>

                                <td>

                                    <span class="badge bg-success">

                                        Sent

                                    </span>

                                </td>

                            </tr>

                            <tr>

                                <td>Assignment Reminder</td>

                                <td>Computer Science</td>

                                <td>08 July 2026</td>

                                <td>

                                    <span class="badge bg-success">

                                        Sent

                                    </span>

                                </td>

                            </tr>

                            <tr>

                                <td>Holiday Notice</td>

                                <td>All Students</td>

                                <td>05 July 2026</td>

                                <td>

                                    <span class="badge bg-success">

                                        Sent

                                    </span>

                                </td>

                            </tr>

                        </tbody>

                    </table>

                </div>

            </div>

        </div>

    </div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
